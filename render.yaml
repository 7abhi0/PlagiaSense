services:
  - type: web
    name: plagiasense-backend
    env: python
    rootDir: backend
    pythonVersion: 3.11.9

    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:5000 app:app
    envVars:
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: RATE_LIMIT_IP
        value: "100 per hour"
      - key: RATE_LIMIT_USER
        value: "200 per day"
      - key: CORS_ORIGINS
        value: "*"
