services:
  - type: web
    name: plagiasense-backend
    runtime: python
    rootDir: backend
    healthCheckPath: /health

    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: FIREBASE_PROJECT_ID
        value: plagiasense
      - key: FIREBASE_STORAGE_BUCKET
        value: plagiasense.firebasestorage.app
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        fromSecret: FIREBASE_SERVICE_ACCOUNT_JSON
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: RATE_LIMIT_IP
        value: "100 per hour"
      - key: RATE_LIMIT_USER
        value: "200 per day"
      - key: CORS_ORIGINS
        value: "*"
