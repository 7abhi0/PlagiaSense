version: "3.8"

services:
  backend:
    build: ./backend
    container_name: plagiasense_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: plagiasense_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  mongo:
    image: mongo:6.0
    container_name: plagiasense_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: plagiasense
    volumes:
      - mongodata:/data/db

volumes:
  mongodata:
